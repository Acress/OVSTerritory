async function fetchRTTDeep(asset,sym){
  const r=results[asset].find(x=>gSym(x)===sym);if(!r)return;
  const el=document.getElementById(`rtt-steps-${asset}-${sym}`);
  if(el)el.innerHTML=`<div style="padding:16px;text-align:center;color:var(--muted);font-size:11px"><span class="spinner-sm"></span>Fetching deep data...</div>`;
  try{
    const isCG=asset==='crypto'||asset==='meme';
    if(isCG){
      const cgId=r.coin?.id||sym.toLowerCase();
      const res=await fetch(`https://api.coingecko.com/api/v3/coins/${cgId}?localization=false&tickers=false&market_data=false&community_data=false&developer_data=false`);
      const d=await res.json();
      const social={twitter:d.links?.twitter_screen_name||null,telegram:d.links?.telegram_channel_identifier||null,homepage:d.links?.homepage?.[0]||null};
      const cats=d.categories||[];
      let sectorPeers=[],catSlug=cats.find(c=>c&&c.length>2)||'';
      if(catSlug){try{const pr=await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&category=${encodeURIComponent(catSlug)}&order=market_cap_desc&per_page=6&page=1&sparkline=false&price_change_percentage=7d`);if(pr.ok)sectorPeers=await pr.json();}catch(e){}}
      rttCache[asset][sym]={social,categories:cats,sectorPeers,catSlug};
    }else{
      const sectorMap={Technology:['AAPL','MSFT','NVDA'],Financials:['JPM','BAC','WFC'],Healthcare:['UNH','JNJ','PFE'],'Consumer Cyclical':['AMZN','TSLA','HD'],Communication:['GOOGL','META','NFLX'],Energy:['XOM','CVX','COP'],Industrials:['HON','UNP','CAT'],Utilities:['NEE','DUK','SO'],'Real Estate':['PLD','AMT','EQIX'],'Basic Materials':['LIN','APD','ECL']};
      const peerTickers=(sectorMap[r.sector]||['SPY','QQQ','IWM']).filter(t=>t!==sym).slice(0,3);
      const pd=await Promise.all(peerTickers.map(t=>fetchYahoo(t).catch(()=>null)));
      const sectorPeers=pd.filter(Boolean).map(p=>({ticker:p.ticker,c5d:p.c5d||0}));
      rttCache[asset][sym]={sectorPeers,catSlug:r.sector||''};
    }
    const el2=document.getElementById(`rtt-steps-${asset}-${sym}`);
    if(el2)el2.innerHTML=buildRTTSteps(r,asset);
  }catch(e){
    const el3=document.getElementById(`rtt-steps-${asset}-${sym}`);
    if(el3)el3.innerHTML=buildRTTSteps(r,asset)+`<div style="padding:8px 14px;font-size:10px;color:var(--red)">Deep fetch failed: ${e.message}</div>`;
  }
}

// ── HELPERS ──
function gSym(r){return r.coin?.symbol?.toUpperCase()||r.ticker||'';}
function gName(r){return r.coin?.name||r.name||'';}
function gPrice(r){return r.coin?.current_price||r.price||0;}
function gExch(r,asset){
  if(asset!=='crypto'&&asset!=='meme')return{name:'NYSE/NASDAQ',best:true};
  const wb=r.wb;
  if(wb?.on_bn_global)return{name:'Binance',best:true};
  if(wb?.on_coinbase)return{name:'Coinbase',best:true};
  if(wb?.wb_tradable)return{name:'Webull',best:true};
  if((r.vol||0)>5e6)return{name:'Binance likely',best:false};
  return{name:'Check',best:false};
}
function sBadge(v,colorOrCls){
  const isV=typeof colorOrCls==='string'&&colorOrCls.startsWith('var');
  const c=isV?colorOrCls:(colorOrCls==='tg'?'var(--green)':colorOrCls==='ta'?'var(--amber)':colorOrCls==='tr2'?'var(--red)':'var(--blue)');
  return`<span style="color:${c};font-weight:500">${v}</span><span class="sbar"><span class="sbar-fill" style="width:${v*10}%;background:${c}"></span></span>`;
}
function cp(t,btn){navigator.clipboard.writeText(String(t)).then(()=>{if(btn){btn.classList.add('copied');btn.textContent='✓';setTimeout(()=>{btn.classList.remove('copied');btn.textContent='⧉'},1200);}});}
function fmtP(p){if(!p)return'—';if(p>=1000)return'$'+p.toLocaleString(undefined,{maximumFractionDigits:0});if(p>=1)return'$'+p.toFixed(3);if(p>=0.01)return'$'+p.toFixed(5);return'$'+p.toFixed(7);}
function fmtV(v){if(!v)return'—';if(v>=1e12)return'$'+(v/1e12).toFixed(1)+'T';if(v>=1e9)return'$'+(v/1e9).toFixed(1)+'B';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+Math.round(v);}
function trunc(s,n){return s&&s.length>n?s.slice(0,n-1)+'…':s||'';}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function setS(asset,msg,pct){const e=document.getElementById('status-'+asset);if(e)e.textContent=msg;if(pct!==undefined){const p=document.getElementById('pbar-'+asset);if(p)p.style.width=pct+'%';}}

// ── TEST TRACKER SYSTEM ──
// Uses localStorage to persist test sessions across browser visits.
// Each test session stores entry prices + an array of price updates over time.
// Excel export via SheetJS — dynamically loaded on demand.

const TEST_KEY = 'multi_asset_tests_v1';

function loadTests() {
  try { return JSON.parse(localStorage.getItem(TEST_KEY)||'[]'); }
  catch(e) { return []; }
}
function saveTests(tests) {
  try { localStorage.setItem(TEST_KEY, JSON.stringify(tests)); } catch(e) {}
}

// ── SELECTION MODAL STATE ──
let selAsset = null;
let selItems = [];  // all candidates for the modal
let selChecked = new Set();

function openSaveTestModal(asset) {
  const signals = results[asset];
  if(!signals || !signals.length) {
    alert('No scan results found. Run a scan first, then click Save Test.');
    return;
  }
  selAsset = asset;
  selItems = signals.map(r => ({
    sym:    gSym(r),
    name:   gName(r),
    price:  gPrice(r),
    action: r.action,
    prob:   r.prob,
    lv:     r.lv,
    sector: r.sector||'—',
    cgId:   r.coin?.id||null,
  }));
  // Pre-select all BUY signals
  selChecked = new Set(selItems.filter(x=>x.action==='BUY').map(x=>x.sym));
  renderSelList('');
  document.getElementById('sel-overlay').classList.add('show');
  document.getElementById('sel-search').value = '';
  updateSelCount();
}

function closeSel() {
  document.getElementById('sel-overlay').classList.remove('show');
}

function renderSelList(filter) {
  const f = filter.toUpperCase().trim();
  const visible = f ? selItems.filter(x=>x.sym.includes(f)||x.name.toUpperCase().includes(f)) : selItems;
  const list = document.getElementById('sel-list');
  if(!visible.length) { list.innerHTML='<div style="padding:14px;color:var(--muted);font-size:11px;text-align:center">No tokens match filter.</div>'; return; }
  list.innerHTML = visible.map(item => {
    const chk = selChecked.has(item.sym);
    const ac = item.action==='BUY'?'tg':item.action==='ACCUMULATE'?'tb':item.action==='WAIT'?'ta':'tm';
    return `<div class="sel-item" onclick="toggleSel('${item.sym}')">
      <input type="checkbox" id="chk-${item.sym}" ${chk?'checked':''} onclick="event.stopPropagation();toggleSel('${item.sym}')">
      <div class="sel-item-info">
        <div class="sel-item-sym" style="color:${COLORS[selAsset]}">${item.sym} <span class="tag ${ac}" style="font-size:9px">${item.action}</span></div>
        <div class="sel-item-meta">${item.name} · ${item.sector} · ${item.prob}% bounce prob · Liveness ${item.lv}/10</div>
      </div>
      <div style="font-weight:600;font-size:12px;color:${item.action==='BUY'?'var(--green)':'var(--muted)'}">${fmtP(item.price)}</div>
    </div>`;
  }).join('');
}

function toggleSel(sym) {
  if(selChecked.has(sym)) selChecked.delete(sym);
  else selChecked.add(sym);
  // update checkbox visually
  const chk = document.getElementById('chk-'+sym);
  if(chk) chk.checked = selChecked.has(sym);
  updateSelCount();
}

function selAll(buyOnly) {
  if(buyOnly) {
    selChecked = new Set(selItems.filter(x=>x.action==='BUY').map(x=>x.sym));
  } else {
    selChecked.clear();
  }
  renderSelList(document.getElementById('sel-search')?.value||'');
  updateSelCount();
}

function filterSelList() {
  renderSelList(document.getElementById('sel-search')?.value||'');
}

function updateSelCount() {
  const el = document.getElementById('sel-count');
  if(el) el.textContent = `${selChecked.size} token${selChecked.size!==1?'s':''} selected`;
}

function confirmSaveTest() {
  if(!selChecked.size) { alert('Select at least one token.'); return; }
  const today = new Date().toISOString().split('T')[0];
  const selected = selItems.filter(x=>selChecked.has(x.sym));
  const test = {
    id:       Date.now(),
    name:     `${LABELS[selAsset]} · ${today}`,
    asset:    selAsset,
    created:  today,
    regime:   document.getElementById('reg-label')?.textContent||'—',
    tokens:   selected.map(x => ({
      sym:    x.sym,
      name:   x.name,
      sector: x.sector,
      action: x.action,
      prob:   x.prob,
      lv:     x.lv,
      cgId:   x.cgId||null,
      updates: [{ date: today, price: x.price, label: 'Entry' }]
    }))
  };
  const tests = loadTests();
  tests.unshift(test);
  saveTests(tests);
  updateSnapBadge(selAsset);
  closeSel();
  switchPane(selAsset,'snap');
  alert(`✅ Test saved — ${selected.length} tokens tracked from today.\n\nCome back any day, open Test Tracker, and click "Update Prices" to record the new price column.\n\nUse "Export Excel" at any time to download the full price history.`);
}

// ── TEST TRACKER BADGE ──
function updateSnapBadge(asset) {
  const tests = loadTests().filter(s=>s.asset===asset);
  const badge = document.getElementById('snap-badge-'+asset);
  if(!badge)return;
  if(tests.length){badge.textContent=tests.length;badge.classList.add('show');}
  else badge.classList.remove('show');
}

// ── RENDER TEST TRACKER TAB ──
function renderSnapshots(asset) {
  const el = document.getElementById('snap-content-'+asset);
  if(!el)return;
  const tests = loadTests().filter(s=>s.asset===asset);
  if(!tests.length) {
    el.innerHTML=`<div class="test-empty">
      <div style="font-size:24px;margin-bottom:8px">🧪</div>
      <div style="font-family:var(--disp);font-size:14px;margin-bottom:8px">No tests saved yet</div>
      <div style="font-size:11px;line-height:1.7">Run a scan → click <strong style="color:var(--amber)">🧪 Save Test</strong> → select your tokens → save.<br>
      Come back any day → click <strong>Update Prices</strong> to add a new price column.<br>
      Click <strong>Export Excel</strong> to download the full price history for analysis.</div>
    </div>`;
    return;
  }
  let html = `<div class="test-toolbar">
    <div style="font-size:11px;color:var(--muted)">${tests.length} test${tests.length>1?'s':''} saved in this browser</div>
  </div>`;
  tests.forEach(test => {
    const age = Math.floor((Date.now()-test.id)/864e5);
    const updateDates = [...new Set(test.tokens.flatMap(t=>t.updates.map(u=>u.date)))].sort();
    const latestDate = updateDates[updateDates.length-1];
    html+=`<div class="test-card" id="tcard-${test.id}">
      <div class="test-card-hdr">
        <div class="test-card-title">${test.name}</div>
        <button class="del-btn" onclick="deleteTest(${test.id})">✕ Delete</button>
      </div>
      <div class="test-card-meta">
        Created ${age===0?'today':age===1?'yesterday':age+' days ago'} · ${test.tokens.length} tokens · 
        ${updateDates.length} price update${updateDates.length!==1?'s':''} · 
        Latest: ${latestDate} · 
        Regime at start: ${test.regime}
      </div>
      <div class="test-card-btns">
        <button class="scan-btn" style="font-size:10px;padding:4px 12px;background:var(--s3);color:var(--text);border:1px solid var(--b2)" onclick="viewTest(${test.id},'${asset}')">👁 View table</button>
        <button class="scan-btn" style="font-size:10px;padding:4px 12px;background:var(--blue);color:#fff" onclick="updateTestPrices(${test.id},'${asset}')">↻ Update prices</button>
        <button class="scan-btn" style="font-size:10px;padding:4px 12px;background:var(--green);color:#000" onclick="exportTestExcel(${test.id})">⬇ Export Excel</button>
      </div>
      <div id="tview-${test.id}" style="display:none;margin-top:10px"></div>
    </div>`;
  });
  el.innerHTML = html;
  updateSnapBadge(asset);
}

function deleteTest(id) {
  if(!confirm('Delete this test? All price history will be lost.'))return;
  saveTests(loadTests().filter(t=>t.id!==id));
  const asset = document.querySelector('.atab.active')?.id?.replace('atab-','');
  if(asset) { updateSnapBadge(asset); renderSnapshots(asset); }
}

// ── VIEW TEST TABLE ──
function viewTest(id, asset) {
  const test = loadTests().find(t=>t.id===id);
  if(!test) return;
  const el = document.getElementById('tview-'+id);
  if(!el) return;
  if(el.style.display !== 'none') { el.style.display='none'; return; }

  // All unique dates across all tokens
  const allDates = [...new Set(test.tokens.flatMap(t=>t.updates.map(u=>u.date)))].sort();

  let html = `<div style="overflow-x:auto"><table class="upd-tbl">
    <thead><tr>
      <th>Ticker</th><th>Name</th><th>Sector</th><th>Action</th><th>Prob</th><th>Live</th>
      ${allDates.map((d,i)=>`<th style="${i===0?'color:var(--amber)':''}">${i===0?'📍 ':''}${d}${i===0?' (entry)':''}<br><span style="font-size:8px;color:var(--muted)">${i>0?'Day '+Math.round((new Date(d)-new Date(allDates[0]))/864e5):''}</span></th>`).join('')}
      ${allDates.length>1?'<th>Return</th><th>Outcome</th>':''}
    </tr></thead><tbody>`;

  test.tokens.forEach(tok => {
    const priceMap = {};
    tok.updates.forEach(u => priceMap[u.date]=u.price);
    const entry = priceMap[allDates[0]];
    const latest = priceMap[allDates[allDates.length-1]];
    const ret = entry && latest ? (latest-entry)/entry*100 : null;
    const retStr = ret!=null ? (ret>=0?'+':'')+ret.toFixed(1)+'%' : '—';
    const retColor = ret==null?'var(--muted)':ret>0?'var(--green)':'var(--red)';
    const outcome = ret==null?'—':ret>=22?'✅ +22% target':ret<=-10?'🛑 -10% stop':ret>=0?'⏳ Positive':'⏳ Negative';
    const ac = tok.action==='BUY'?'tg':tok.action==='ACCUMULATE'?'tb':tok.action==='WAIT'?'ta':'tm';
    html+=`<tr>
      <td style="font-weight:600;color:${COLORS[asset]}">${tok.sym}</td>
      <td>${trunc(tok.name,14)}</td>
      <td><span class="tag tm" style="font-size:9px">${tok.sector}</span></td>
      <td><span class="tag ${ac}">${tok.action}</span></td>
      <td>${tok.prob}%</td>
      <td>${tok.lv}/10</td>
      ${allDates.map((d,i)=>{
        const p=priceMap[d];
        const chg = i>0&&entry&&p ? (p-entry)/entry*100 : null;
        return `<td style="${i===0?'color:var(--amber);font-weight:600':''}">
          ${p?fmtP(p):'—'}
          ${chg!=null?`<br><span style="font-size:9px;color:${chg>=0?'var(--green)':'var(--red)'}">${chg>=0?'+':''}${chg.toFixed(1)}%</span>`:''}
        </td>`;
      }).join('')}
      ${allDates.length>1?`<td style="font-weight:600;color:${retColor}">${retStr}</td><td>${outcome}</td>`:''}
    </tr>`;
  });

  html += '</tbody></table></div>';
  el.innerHTML = html;
  el.style.display = 'block';
}

// ── UPDATE PRICES ──
async function updateTestPrices(id, asset) {
  const tests = loadTests();
  const test = tests.find(t=>t.id===id);
  if(!test)return;
  const today = new Date().toISOString().split('T')[0];

  // Check if today already recorded
  const alreadyToday = test.tokens.some(t=>t.updates.some(u=>u.date===today));
  if(alreadyToday) {
    if(!confirm(`You already have a price update for today (${today}). Update again to overwrite today's prices?`)) return;
  }

  const btn = document.querySelector(`#tcard-${id} .scan-btn[onclick*='updateTestPrices']`);
  if(btn){btn.disabled=true;btn.textContent='⏳ Fetching...';}
  const isCG = asset==='crypto'||asset==='meme';

  try {
    if(isCG) {
      const withIds    = test.tokens.filter(t=>t.cgId);
      const withoutIds = test.tokens.filter(t=>!t.cgId);
      const priceMap = {};
      for(let i=0;i<withIds.length;i+=50){
        const batch=withIds.slice(i,i+50);
        const ids=batch.map(t=>t.cgId).join(',');
        try{
          const r=await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&sparkline=false`);
          if(r.ok){const d=await r.json();d.forEach(c=>priceMap[c.id]=c.current_price);}
        }catch(e){}
        if(i+50<withIds.length)await sleep(600);
      }
      for(const tok of withoutIds){
        try{
          const sr=await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(tok.sym)}`);
          const sd=await sr.json();
          const match=(sd.coins||[]).find(c=>c.symbol.toUpperCase()===tok.sym);
          if(match){tok.cgId=match.id;const mr=await fetch(`https://api.coingecko.com/api/v3/coins/${match.id}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false`);const md=await mr.json();priceMap[match.id]=md.market_data?.current_price?.usd||null;}
          await sleep(300);
        }catch(e){}
      }
      test.tokens.forEach(tok => {
        const p = tok.cgId ? priceMap[tok.cgId] : null;
        if(p) {
          const existing = tok.updates.findIndex(u=>u.date===today);
          const entry = { date:today, price:p, label:'Day '+Math.round((new Date(today)-new Date(test.created))/864e5) };
          if(existing>=0) tok.updates[existing]=entry;
          else tok.updates.push(entry);
        }
      });
    } else {
      const batchSize=15;
      for(let i=0;i<test.tokens.length;i+=batchSize){
        const batch=test.tokens.slice(i,i+batchSize);
        const prices=await Promise.all(batch.map(t=>fetchYahoo(t.sym).catch(()=>null)));
        batch.forEach((tok,j)=>{
          const p=prices[j]?.price||null;
          if(p){
            const daysIn=Math.round((new Date(today)-new Date(test.created))/864e5);
            const existing=tok.updates.findIndex(u=>u.date===today);
            const entry={date:today,price:p,label:'Day '+daysIn};
            if(existing>=0) tok.updates[existing]=entry;
            else tok.updates.push(entry);
          }
        });
        if(i+batchSize<test.tokens.length)await sleep(150);
      }
    }

    saveTests(tests);
    renderSnapshots(asset);
    viewTest(id, asset);
    if(btn){btn.disabled=false;btn.textContent='↻ Update prices';}
    alert(`✅ Prices updated for ${today}.\n\nYou now have ${test.tokens[0]?.updates.length||0} price columns.\nClick "Export Excel" to download the full history.`);
  } catch(e) {
    if(btn){btn.disabled=false;btn.textContent='↻ Update prices';}
    alert('Error fetching prices: '+e.message);
  }
}

// ── EXPORT TO EXCEL ──
async function exportTestExcel(id) {
  const test = loadTests().find(t=>t.id===id);
  if(!test){alert('Test not found.');return;}

  // Load SheetJS dynamically
  if(typeof XLSX === 'undefined') {
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    });
  }

  const allDates = [...new Set(test.tokens.flatMap(t=>t.updates.map(u=>u.date)))].sort();
  const entryDate = allDates[0];

  // ── SHEET 1: Price History ──
  const headers = ['Ticker','Name','Sector','Action','Bounce Prob %','Liveness /10',
    ...allDates.map((d,i)=>i===0?`Entry Price (${d})`:`Price on ${d} (Day ${Math.round((new Date(d)-new Date(entryDate))/864e5)})`),
    ...allDates.slice(1).map((d,i)=>`Return Day ${Math.round((new Date(d)-new Date(entryDate))/864e5)} %`),
    'Current Return %','Outcome','Notes'
  ];

  const rows = test.tokens.map(tok => {
    const priceMap = {};
    tok.updates.forEach(u=>priceMap[u.date]=u.price);
    const entryPrice = priceMap[entryDate];
    const latestDate = allDates[allDates.length-1];
    const latestPrice = priceMap[latestDate];
    const curRet = entryPrice&&latestPrice ? ((latestPrice-entryPrice)/entryPrice*100) : null;
    const outcome = curRet==null?'No data':curRet>=22?'Target hit (+22%)':curRet<=-10?'Stop hit (-10%)':curRet>=0?'Open - positive':'Open - negative';
    const row = [
      tok.sym, tok.name, tok.sector, tok.action, tok.prob, tok.lv,
      ...allDates.map(d=>priceMap[d]||''),
      ...allDates.slice(1).map(d=>{
        const p=priceMap[d];
        return entryPrice&&p ? parseFloat(((p-entryPrice)/entryPrice*100).toFixed(2)) : '';
      }),
      curRet!=null ? parseFloat(curRet.toFixed(2)) : '',
      outcome, ''
    ];
    return row;
  });

  const ws1Data = [headers,...rows];

  // ── SHEET 2: Summary Stats ──
  const resolved = test.tokens.filter(tok=>{
    const priceMap={};tok.updates.forEach(u=>priceMap[u.date]=u.price);
    const e=priceMap[entryDate],l=priceMap[allDates[allDates.length-1]];
    if(!e||!l)return false;
    const r=(l-e)/e*100;
    return r>=22||r<=-10;
  });
  const wins = test.tokens.filter(tok=>{
    const pm={};tok.updates.forEach(u=>pm[u.date]=u.price);
    const e=pm[entryDate],l=pm[allDates[allDates.length-1]];
    return e&&l&&(l-e)/e*100>=22;
  }).length;
  const losses = resolved.length - wins;
  const returns = test.tokens.map(tok=>{
    const pm={};tok.updates.forEach(u=>pm[u.date]=u.price);
    const e=pm[entryDate],l=pm[allDates[allDates.length-1]];
    return e&&l?(l-e)/e*100:null;
  }).filter(x=>x!=null);
  const avgRet = returns.length ? returns.reduce((a,b)=>a+b,0)/returns.length : 0;

  const ws2Data = [
    ['Test Summary'],[''],
    ['Test name', test.name],
    ['Asset class', LABELS[test.asset]],
    ['Start date', entryDate],
    ['Latest update', allDates[allDates.length-1]],
    ['Days tracked', Math.round((new Date(allDates[allDates.length-1])-new Date(entryDate))/864e5)],
    ['Regime at start', test.regime],
    [''],
    ['Total tokens', test.tokens.length],
    ['Price updates recorded', allDates.length],
    [''],
    ['Performance (resolved trades only)'],
    ['Target hit (+22%)', wins],
    ['Stop hit (-10%)', losses],
    ['Win rate', resolved.length>0?parseFloat((wins/resolved.length*100).toFixed(1))+'%':'Not enough data'],
    ['Average return (all tokens)', parseFloat(avgRet.toFixed(2))+'%'],
    [''],
    ['How to share with Claude for analysis'],
    ['1. Copy this file and paste it into a Claude conversation'],
    ['2. Ask: "Analyse this test data. I held for X days. What was the win rate, average return,'],
    ['   best and worst performers, and what does this tell me about the tool accuracy?"'],
  ];

  // ── SHEET 3: Raw Updates Log ──
  const ws3Data = [['Ticker','Name','Update Date','Days from entry','Price','Label']];
  test.tokens.forEach(tok=>{
    tok.updates.forEach(u=>{
      ws3Data.push([tok.sym,tok.name,u.date,Math.round((new Date(u.date)-new Date(entryDate))/864e5),u.price,u.label||'']);
    });
  });

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.aoa_to_sheet(ws1Data);
  const ws2 = XLSX.utils.aoa_to_sheet(ws2Data);
  const ws3 = XLSX.utils.aoa_to_sheet(ws3Data);

  // Column widths for sheet 1
  ws1['!cols'] = [
    {wch:8},{wch:18},{wch:12},{wch:12},{wch:10},{wch:8},
    ...allDates.map(()=>({wch:16})),
    ...allDates.slice(1).map(()=>({wch:14})),
    {wch:14},{wch:22},{wch:20}
  ];

  XLSX.utils.book_append_sheet(wb,ws1,'Price History');
  XLSX.utils.book_append_sheet(wb,ws2,'Summary');
  XLSX.utils.book_append_sheet(wb,ws3,'Raw Updates');

  const filename = `test_${test.asset}_${entryDate}_${allDates.length}updates.xlsx`;
  XLSX.writeFile(wb, filename);
}
